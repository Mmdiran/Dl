name: Download and Split for User

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Direct file URL'
        required: false
        type: string
      file_id:
        description: 'Telegram file ID'
        required: false
        type: string
      zip_password:
        description: 'ZIP password'
        required: true
        type: string
      user_id:
        description: 'Telegram user ID'
        required: true
        type: string

permissions:
  contents: write

env:
  BOT_URL: https://aerin3.serv00.net/github/bot.php

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Notify start
        run: |
          curl -s -X POST "$BOT_URL" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"event\":\"started\"}"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full wget
          pip install pyrogram tgcrypto

      - name: Download file
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          INPUT_FILE_URL: ${{ github.event.inputs.file_url }}
          INPUT_FILE_ID: ${{ github.event.inputs.file_id }}
        run: |
          if [ -n "$INPUT_FILE_URL" ]; then
            echo "Downloading from URL..."
            ORIGINAL_NAME=$(basename "$INPUT_FILE_URL" | cut -d '?' -f1)
            [ -z "$ORIGINAL_NAME" ] && ORIGINAL_NAME="downloaded_file"
            wget -O "$ORIGINAL_NAME" "$INPUT_FILE_URL"
          elif [ -n "$INPUT_FILE_ID" ]; then
            cat << 'EOF' > dl.py
import os, asyncio
from pyrogram import Client

async def main():
    app = Client(
        "session",
        api_id=int(os.environ["TG_API_ID"]),
        api_hash=os.environ["TG_API_HASH"],
        session_string=os.environ["TG_SESSION_STRING"]
    )

    async with app:
        file_path = await app.download_media(os.environ["INPUT_FILE_ID"])
        print(file_path)

asyncio.run(main())
EOF

            python dl.py > file.txt
            ORIGINAL_NAME=$(cat file.txt)
          else
            echo "No input file"
            exit 1
          fi

          echo "ORIGINAL_NAME=$ORIGINAL_NAME" >> $GITHUB_ENV

      - name: Notify downloaded
        run: |
          curl -s -X POST "$BOT_URL" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"event\":\"downloaded\"}"

      - name: Create chunks
        run: |
          7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=3 -v95m archive.7z "$ORIGINAL_NAME"

      - name: Remove original file
        run: rm -f "$ORIGINAL_NAME"

      - name: Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Count chunks
        id: chunks
        run: |
          CHUNKS=$(ls archive.7z.* 2>/dev/null | wc -l)
          echo "total_chunks=$CHUNKS" >> $GITHUB_OUTPUT

      - name: Notify total chunks
        run: |
          curl -s -X POST "$BOT_URL" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"event\":\"total_chunks\",\"value\":${{ steps.chunks.outputs.total_chunks }}}"

      - name: Create branch & push chunks
        run: |
          BRANCH="user_${{ github.event.inputs.user_id }}_$(date +%s)"
          git checkout --orphan "$BRANCH"
          git rm -rf . || true

          echo "Chunks for user" > README.md

          chunks=(archive.7z.*)
          total=${#chunks[@]}
          batch=2
          start=0
          uploaded=0

          while [ $start -lt $total ]; do
            end=$((start + batch - 1))
            [ $end -ge $total ] && end=$((total - 1))

            for i in $(seq $start $end); do
              git add "${chunks[$i]}"
            done

            git add README.md
            git commit -m "Chunks $((start+1))-$((end+1))"

            git push origin "$BRANCH"

            uploaded=$((end+1))

            curl -s -X POST "$BOT_URL" \
              -H "Content-Type: application/json" \
              -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"event\":\"progress\",\"uploaded\":$uploaded}"

            start=$((end + 1))
            sleep 2
          done

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Notify done
        run: |
          curl -s -X POST "$BOT_URL" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"event\":\"done\",\"branch\":\"${{ env.BRANCH }}\"}"

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "$BOT_URL" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"event\":\"error\",\"message\":\"Workflow failed\"}"
